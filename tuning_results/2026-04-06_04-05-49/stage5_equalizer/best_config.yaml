  costas_Kp: 0.005
  costas_Ki: 1.0e-05
  costas_gate_power_percentile_low: 15.0
  costas_gate_power_percentile_high: 85.0
  gardner_Kp: 0.004
  gardner_Ki: 2.0e-05
  gardner_gate_energy_percentile_low: 25.0
  gardner_gate_energy_percentile_high: 90.0
  gardner_gate_energy_scale_low: 3.0
  gardner_gate_energy_scale_high: 3.0
  burst_crop_enable: false
  burst_crop_margin_symbols: 10
  burst_crop_window_scale: 1.0
  burst_crop_min_expected_fraction: 0.9
