logging:
  level: DEBUG
radio:
  ip_address: ip:192.168.0.151
  queue_size: 32
  debug_mode: true
  max_datagram_size: 256
transmitter:
  tx_cyclic_buffer: false
  tx_gain_dB: 0
  tx_bandwidth: 1e6
  tx_carrier: 866.5e6
  tx_buffer_size: 1024
receiver:
  rx_gain_dB: 6
  rx_bandwidth: 1e6
  rx_carrier: 866.5e6
  gain_mode: manual
  buffer_size: 262144
modulation:
  type: PSK
  order: 2
  symbol_rate: 125e3
  samples_per_symbol: 8
  sample_rate: 1e6
coding:
  rs_num_ecc: 32
  interleaver_seed: 42
  interleaver_length: 16
  convolutional_K: 7
  convolutional_datarate: 1/4
