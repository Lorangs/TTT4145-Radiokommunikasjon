  code_index: 7
  header_repeat_count: 2
  correlation_threshold: 0.7
  decode_candidate_count: 1
  decode_candidate_min_peak: 0.65
  correlation_scale_factor_threshold: 0.7
synchronization:
  nfft: 16384
  signal_bw: 1e6
  signal_power_threshold_dB: 1.0
  costas_zeta: 0.707
  costas_K0: 1.0
