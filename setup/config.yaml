logging:
  level: "INFO"                    # Shared repo log level. Supported: "DEBUG", "INFO", "WARNING", "ERROR".

radio:
  ip_address: "ip:192.168.0.151"      # ip address of sdr radio
  queue_size: 32                      # Maxsize of RX and TX queues. Also determines the max number of messages stored for display in the TUI.
  debug_mode: True                    # If True, the system will run in debug mode with live plotting of signals.
  max_datagram_size: 256              # Maximum number of bytes in a datagram. Adjust based on expected message sizes and memory constraints.

reliability:
  ack_timeout_seconds: 1.5            # Time to wait for an ACK before retransmitting the same DATA datagram.
  max_retries: 2                      # Number of retransmissions after the first send attempt.
  duplicate_cache_size: 128           # Recent inbound DATA datagrams remembered to suppress duplicate delivery while still ACKing them.

transmitter:
  tx_cyclic_buffer: False             # Enable/disable cyclic buffer
  tx_gain_dB: 0                     # range: -90 to 0 dB
  tx_bandwidth: 1e6                   # TX bandwidth [Hz]
  tx_carrier: 866.5e6                 # TX local oscillator (carrier frequenzy)
  tx_buffer_size: 1024                # 2**10 samples 

receiver: 
  rx_gain_dB: 6                     # range: 0 to 73 dB
  rx_bandwidth: 1e6                 # RX bandwidth [Hz]
  rx_carrier: 866.5e6                 # RX local oscillator (carrier frequenzy)
  gain_mode: 'manual'                 # "manual" or Automatic Gain Control: "fast_attack", "slow_attack"
  buffer_size: 262144                  # 2**18 samples      

modulation:
  type: "PSK"                        # Modulation type: "PSK" and "QAM"
  order: 2                            # Modulation order: 2 for BPSK, 4 for QPSK, 16 for 16-QAM, etc. Must be a power of 2.
  symbol_rate: 125e3                  # Symbols per second. symbol period = 1 / symbol_rate = 4 us
  samples_per_symbol: 8               # Samples per Symbol. Must be an integer. Determines the oversampling factor for pulse shaping and matched filtering.
  sample_rate: 1e6                    # EDIT ONLY THROUGH SYMBOL RATE AND SAMPLES PER SYMBOL (symbol_rate * samples_per_symbol)

coding:
  rs_num_ecc: 32                       # For 32 ECC symbols, adds 128 bytes of redundancy to the origial message.
  interleaver_seed: 42                 # Seed for random interleaver. Must be the same for transmitter and receiver to ensure correct deinterleaving.
  interleaver_length: 16             # Length of the interleaver. Must be the same for transmitter and receiver to ensure correct deinterleaving.
  convolutional_K: 7                   # Memory length (constraint length) for convolutional coding. Choices are 3, 5 or 7.
  convolutional_datarate: "1/4"        # Code rate for convolutional coding. Choices are "1/2", "1/3", "1/4".
  scrambler_register_length: 7         # 

filter:
  rrc_roll_off: 0.5                   # Roll-off factor (alpha) for pulse shaping filter
  rrc_filter_span: 10                 # Filter span in symbols for RRC filter (total filter length = rrc_filter_span * samples_per_symbol)
  rrc_filter_scale_factor: 1          # (2**15-1) Scale factor for RRC filter coefficients to fit within int16 range for hardware filtering.
  hardware_filter_enable: False        # Enable/disable hardware RRC filtering on the SDR. If False, RRC filtering is done in software.
  hardware_filter_file: "rrc_filter_coefficients.ftr"  # File to store RRC filter coefficients for hardware filtering. Only used if rrc_filtering_enable is True.
  butterworth_enable: false           # 
  butterworth_order: 4                # Rolloff order 
  butterworth_cutoff_hz: 200e3        # Valid optional RX low-pass default for the 125 ksym/s, alpha=0.5 link.

gold_sequence:
  code_length: 31                    # Supported lengths follow the implemented Gold-code families.
  code_index: 7                      # Selects one code from the family for this link.
  header_repeat_count: 2             # Repeat the Gold sync/header block to make packet confirmation more robust than a single 31-symbol header.
  correlation_threshold: 0.75        # Detection threshold for symbol-domain Gold correlation.
  decode_candidate_count: 1          # Max number of full payload decode attempts per run after header search.
  decode_candidate_min_peak: 0.7      # Minimum Gold peak required before attempting a full decode on a candidate.

synchronization:
  nfft: 16384                  # Higher FFT resolution reduces residual CFO before the fine loop, which matters more over the air.
  signal_bw: 1e6                  # Loop bandwidth for Costas loop in Hz. Determines how quickly the loop can track frequency and phase variations. A common choice is around 1-5% of the symbol rate, so for a symbol rate of 125 kHz, a bandwidth of 2500 Hz (2% of symbol rate) is a reasonable starting point. Adjust based on expected frequency offsets and noise conditions.
  signal_power_threshold_dB: 1.0     # Threshold level above the measured noise floor in dB for considering a signal presence.
  costas_zeta: 0.707                     # Damping factor for Costas loop. A value of 0.707 (1/sqrt(2)) provides critical damping, which is a common choice for stable and responsive loop behavior. Adjust based on desired trade-off between stability and responsiveness.
  costas_K0: 1.0                         # VCO gain for costas loop.    
  costas_alpha: 0.02                    # Proportional gain for Costas loop (alternative to loop bandwidth). Adjust based on desired loop response. Ignored if costas_loop_bw is set.
  costas_Kp: 0.005                      # Proportional gain for the Costas loop.
  costas_Ki: 1.0e-5                     # Integral gain for the Costas loop.
  costas_gate_power_percentile_low: 15.0   # Lower power percentile used for Costas update gating on the active symbol region.
  costas_gate_power_percentile_high: 85.0  # Upper power percentile used for Costas update gating on the active symbol region.
  gardner_Kp: 0.004                     # Proportional gain for the Gardner timing loop.
  gardner_Ki: 2.0e-5                    # Integral gain for the Gardner timing loop.
  gardner_gate_energy_percentile_low: 25.0   # Lower energy percentile used for Gardner update gating.
  gardner_gate_energy_percentile_high: 90.0  # Upper energy percentile used for Gardner update gating.
  gardner_gate_energy_scale_low: 3.0        # Scale factor applied to the lower Gardner gate percentile.
  gardner_gate_energy_scale_high: 3.0       # Scale factor applied to the upper Gardner gate percentile.
  burst_crop_enable: false                   # If true, crop the RX buffer around the strongest burst candidate before synchronization.
  burst_crop_margin_symbols: 10             # Extra symbols kept on each side of the burst crop. The previous implicit default was one filter span.
  burst_crop_window_scale: 1.0              # Multiplier applied to the expected TX burst length when forming the burst-energy crop window.
  burst_crop_min_expected_fraction: 0.9     # If the cropped region is shorter than this fraction of the expected TX burst, fall back to the full RX buffer.
  burst_crop_allow_full_buffer_fallback: true  # If true, ignore an obviously too-short crop and retry sync on the full RX buffer instead.
  header_phase_search_offset_samples: 4     # Search radius, in matched-filter samples, around the detected header start during timing acquisition.
  preamble_repeat_count: 12                 # Number of repeated short Gold-code blocks sent before the repeated Gold header for direct timing/CFO acquisition.
  timing_preamble_block_symbols: 31         # Length of the timing-friendly alternating BPSK acquisition block before repetition.
  preamble_cfo_enable: true                 # If true, estimate a coarse phase slope from the repeated preamble before Gardner/Costas.
  preamble_cfo_min_score: 0.45              # Minimum repeated-preamble score required before applying preamble-based CFO correction.
  preamble_symbol_min_score: 0.50           # Minimum repeated-preamble symbol-domain score required before applying a post-Gardner symbol-slip correction.
  preamble_symbol_search_radius_symbols: 4  # Symbol-domain search radius around the expected repeated preamble start after Gardner timing recovery.
  header_fractional_timing_enable: true     # Search small fractional sample offsets around the current symbol lattice and keep the one with the best header metric.
  header_fractional_timing_max_offset_samples: 1.0  # Maximum plus/minus fractional sample offset tested against the known header.
  header_fractional_timing_step_samples: 0.25  # Step size, in matched-filter samples, for header-driven fractional timing refinement.
  preamble_cfo_max_abs_slope_rad_per_symbol: 0.05  # Clamp preamble-estimated phase slope to avoid over-correcting noisy captures.
  header_alignment_candidate_count: 4       # Number of strongest preamble-alignment candidates to rescore before choosing the packet start.
  header_alignment_soft_enable: false       # Disabled by default: the current stable regime did not need soft alignment, and the lone weak-start case still failed downstream.
  header_alignment_soft_phase_min_score: 0.25  # Minimum preamble phase/coherence score required to use soft header alignment.
  timing_header_search_radius_symbols: 8    # Symbol-domain search radius used for header slip correction and Gold search around the expected header index after timing recovery.
  timing_header_candidate_count: 5          # Number of nearby symbol-domain Gold candidates to rank for final decode attempts.
  gardner_tracking_payload_symbols: 64      # Number of payload symbols Gardner is allowed to track after the header before holding timing fixed.
  header_carrier_branch_selection_enable: false  # Disabled by default while slope correction stays off; this keeps the active path explicit instead of evaluating an unused branch.
  header_carrier_apply_slope_enable: false  # Apply the header-estimated phase slope before Costas when the estimate looks trustworthy.
  header_carrier_slope_min_score: 0.55      # Minimum header carrier score required before applying the phase slope estimate.
  header_carrier_max_abs_slope_rad_per_symbol: 0.05  # Clamp the pre-Costas phase slope correction to avoid over-rotation on noisy estimates.
  short_equalizer_enable: true              # Train a short symbol-rate equalizer on the known preamble/header before Costas to reduce residual ISI.
  short_equalizer_tap_count: 5              # Odd tap count for the short trained equalizer.
  short_equalizer_regularization: 1.0e-3    # Ridge regularization used when solving the equalizer taps.
  short_equalizer_apply_if_improved: true   # Only keep the trained equalizer when it lowers training error on the known symbols.
  short_equalizer_train_on_preamble: true   # Use the repeated preamble symbols as equalizer training data.
  short_equalizer_train_on_header: true     # Use the repeated Gold header symbols as equalizer training data.
  short_equalizer_min_training_symbols: 32  # Minimum valid known symbols required before training the equalizer.

plotter:
  num_rows: 200                    # Number of rows in waterfall display
  center_freq: 866.5e6             # Center frequency for display (Hz)
  time_plot_samples: 500           # Number of samples to show in time plot
  update_interval: 100             # Milliseconds between plot updates
  psd_nperseg: 1024                # FFT size for PSD calculation
  max_constellation_points: 500   # Max points in constellation diagram
  psd_window: 'hann'               # Window function for PSD
  psd_scaling: 'density'           # PSD scaling type
  psd_max_points: 2048             # Max points in PSD plot
  multi_window: True                  # If True, use multiple windows for different plots. If False, use a single window with subplots.
